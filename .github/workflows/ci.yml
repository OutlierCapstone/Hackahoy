name: ci
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build (NestJS)
        run: npm run build
      - name: Lint (정보용, 실패해도 머지 막지 않음)
        run: npm run lint || true
