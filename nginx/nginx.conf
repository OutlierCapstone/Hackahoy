worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $server_port $upstream_port {
        5001  3001;
        5002  3002;
        5003  3003;
        5004  3004;
        5005  3005;
        5006  3006;
        5007  3007;
        default 3001;
    }

    map $server_port $prob_id {
        5001  1;
        5002  2;
        5003  3;
        5004  4;
        5005  5;
        5006  6;
        5007  7;
        default 0;
    }

    server {
        listen 5001;
        listen 5002;
        listen 5003;
        listen 5004;
        listen 5005;
        listen 5006;
        listen 5007;

        location /set-uid {
            set $upstream "";
            access_by_lua_block {
                ngx.var.upstream = "http://172.17.0.1:" .. ngx.var.upstream_port

                local args = ngx.req.get_uri_args()
                local uid = args["uid"]
                if uid and uid ~= "" then
                    ngx.header["Set-Cookie"] = "uid=" .. uid .. "; Path=/; HttpOnly"
                end
                return ngx.redirect("/")
            }
            proxy_pass $upstream;
        }

        location / {
            lua_need_request_body on;

            set $upstream "";

            access_by_lua_block {
                local http = require "resty.http"
                local cjson = require "cjson"
                local hc = http.new()

                local uri = ngx.var.request_uri
                local method = ngx.req.get_method()

                ngx.var.upstream = "http://172.17.0.1:" .. ngx.var.upstream_port

                local raw_headers = ngx.req.get_headers()
                local user_id = "anonymous"
                local auth = raw_headers["authorization"]
                if auth then
                    user_id = auth:gsub("^Bearer%s+", "")
                else
                    local cookie_uid = ngx.var.cookie_uid
                    if cookie_uid and cookie_uid ~= "" then
                        user_id = cookie_uid
                    end
                end

                if uri:find("%.ico$") or uri:find("%.js$")
                    or uri:find("%.css$") or uri:find("%.png$")
                    or uri:find("%.jpg$") or uri:find("%.jpeg$")
                    or uri:find("%.PNG$") or uri:find("%.gif$")
                    or uri:find("%.webp$") or uri:find("%.woff")
                    or uri:find("%.svg$") or uri:find("%.map$")
                    or uri:find("_next/")
                    or uri:find("_rsc=")
                    or uri:find("webpack")
                    or uri:find("missions")
                    or uri:find("/img/") or uri:find("__nextjs") or method == "GET"
                    then
                    return
                end

                local prob_id = tonumber(ngx.var.prob_id) or 0

                ngx.log(ngx.ERR, "=== LUA ?�행??method=", method, " uri=", uri, " user_id=", user_id)

                ngx.req.read_body()
                local req_body = ngx.req.get_body_data()
                if not req_body then
                    local body_file = ngx.req.get_body_file()
                    if body_file then
                        local f = io.open(body_file, "rb")
                        if f then
                            req_body = f:read("*all")
                            f:close()
                        end
                    end
                end
                req_body = req_body or ""

                ngx.log(ngx.ERR, "=== collect ?�송 user_id=", user_id, " prob_id=", prob_id)
                local ok, err = pcall(function()
                    hc:set_timeout(3000)
                    hc:request_uri("http://172.17.0.1:4000/api/collect", {
                        method = "POST",
                        body = cjson.encode({
                            user_id    = user_id,
                            problem_id = prob_id,
                            method     = method,
                            uri        = uri,
                            payload    = req_body,
                        }),
                        headers = { ["Content-Type"] = "application/json" }
                    })
                end)

                if not ok then
                    ngx.log(ngx.ERR, "collect error: ", err)
                else
                    ngx.log(ngx.ERR, "=== collect ?�공!")
                end
            }

            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
