worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile       on;
    keepalive_timeout 65;
    resolver 127.0.0.11 valid=30s;

    server {
        listen 5001; listen 5002; listen 5003;
        listen 5004; listen 5005; listen 5006;

        location / {
            # 요청 바디를 읽어오도록 설정
            lua_need_request_body on;

            access_by_lua_block {
                local http = require "resty.http"
                local cjson = require "cjson"
                local hc = http.new()

                local uri = ngx.var.request_uri
                local method = ngx.req.get_method()

                -- 1. POST 요청이 아니거나 정적 파일(.js, .css 등)이면 수집 안 함
                if method ~= "POST" or uri:find("%.ico$") or uri:find("%.js$") or uri:find("%.css$") or uri:find("%.png$") then
                    return
                end

                -- 2. 포트별 문제 ID 매핑
                local port = tonumber(ngx.var.server_port)
                local prob_id = 4
                if port == 5001 or port == 5002 then prob_id = 1
                elseif port == 5003 then prob_id = 2
                elseif port == 5004 or port == 5005 then prob_id = 3
                end

                -- 3. 요청 바디 읽기
                ngx.req.read_body()
                local req_body = ngx.req.get_body_data()
                
                -- 바디가 너무 커서 임시 파일에 저장된 경우 처리
                if not req_body then
                    local body_file = ngx.req.get_body_file()
                    if body_file then
                        local f = io.open(body_file, "rb")
                        req_body = f:read("*all")
                        f:close()
                    end
                end

                -- 4. 로그 수집 서버(NestJS)로 전송
                local user_id = "cmm0uz6v90000rvpkbstteqdp" -- 실제 운영 시 쿠키 등에서 추출 권장
                local res, err = hc:request_uri("http://host.docker.internal:4000/api/collect", {
                    method = "POST",
                    body = cjson.encode({
                        user_id    = user_id,
                        problem_id = prob_id,
                        method     = method,
                        uri        = uri,
                        headers    = ngx.req.get_headers(),
                        payload    = req_body or ""
                    }),
                    headers = { ["Content-Type"] = "application/json" }
                })
            }

            proxy_pass http://host.docker.internal:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}