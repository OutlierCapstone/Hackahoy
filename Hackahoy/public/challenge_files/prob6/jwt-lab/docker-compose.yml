services:
  backend:
    build:
      context: ./backend
    ports:
      - "4006:5000"

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "3006:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/public:/usr/share/nginx/html
      - ./frontend/public/img:/usr/share/nginx/html/img
    depends_on:
      - frontend
      - backend
